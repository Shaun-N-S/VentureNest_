name: Production CI/CD

on:
  push:
    branches: ["main"]

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Setup Node with caching
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: |
            Backend/package-lock.json
            Frontend/package-lock.json

      # 3. Backend
      - name: Install Backend
        run: cd Backend && npm ci

      - name: Lint Backend
        run: cd Backend && npm run lint

      - name: Build Backend
        run: cd Backend && npm run build

      # 4. Frontend
      - name: Install Frontend
        run: cd Frontend && npm ci

      - name: Lint Frontend
        run: cd Frontend && npm run lint

      - name: Build Frontend
        run: cd Frontend && npm run build

      # 5. Login to DockerHub
      - name: Docker Login
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # 6. Build Docker Image
      - name: Build Docker Image
        run: docker build -t shaun1092/venturenest-backend ./Backend

      # 7. Push Docker Image
      - name: Push Docker Image
        run: docker push shaun1092/venturenest-backend

      # 8. Deploy to EC2
      - name: Deploy to Server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_KEY }}
          script: |
            docker pull shaun1092/venturenest-backend
            
            docker stop backend || true
            docker rm backend || true
            
            docker run -d \
              --env-file  ~/VentureNest_/.env \
              -p 4000:4000 \
              --name backend \
              --restart always \
              shaun1092/venturenest-backend