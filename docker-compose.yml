services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    ports:
      - "4000:4000"
    env_file:
      - ./backend/.env

frontend:
  build:
    context: ./frontend
    dockerfile: Dockerfile.prod
    args:
      VITE_API_BASE_URL: http://localhost:4000
  ports:
    - "80:80"
  depends_on:
    - backend
